[project]
name = "pa-google"
version = "0.1.0"
description = "PA Google Workspace integration — wraps gws CLI"
requires-python = ">=3.11"
dependencies = ["pa-core"]

[project.scripts]
pa-google = "pa_google.cli:main"

[tool.uv.sources]
pa-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
