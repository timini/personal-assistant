[project]
name = "pa-notion"
version = "0.1.0"
description = "PA Notion integration — task management via Notion API"
requires-python = ">=3.11"
dependencies = ["pa-core", "httpx>=0.27"]

[project.scripts]
pa-notion = "pa_notion.cli:main"

[tool.uv.sources]
pa-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
