[project]
name = "pa-core"
version = "0.1.0"
description = "PA shared utilities — config, CLI runner, logging"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0", "python-dotenv>=1.0", "jinja2>=3.1", "httpx>=0.27"]

[project.scripts]
pa-core = "pa_core.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
