[project]
name = "pa-telegram"
version = "0.1.0"
description = "PA Telegram integration — send briefings and notifications via Telegram Bot API"
requires-python = ">=3.11"
dependencies = ["pa-core", "httpx>=0.27"]

[project.scripts]
pa-telegram = "pa_telegram.cli:main"

[tool.uv.sources]
pa-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
